[build]
  command = "npm run build"
  publish = "dist"

[[headers]]
  for = "/*"
  [headers.values]
    Content-Security-Policy = "default-src 'self'; base-uri 'self'; object-src 'none'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' blob: data:; font-src 'self'; connect-src 'self'; worker-src 'self' blob:; media-src 'self' blob:; frame-ancestors 'none'"
    Permissions-Policy = "camera=(self), microphone=()"
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "DENY"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Cross-Origin-Opener-Policy = "same-origin"
    Cache-Control = "no-cache"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/images/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/icons/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/sw.js"
  [headers.values]
    Cache-Control = "no-cache"

[[headers]]
  for = "/workbox-*"
  [headers.values]
    Cache-Control = "no-cache"

[[headers]]
  for = "/manifest.webmanifest"
  [headers.values]
    Cache-Control = "no-cache"

[[headers]]
  for = "/manifest/*"
  [headers.values]
    Cache-Control = "no-cache"

[[headers]]
  for = "/config"
  [headers.values]
    X-Robots-Tag = "noindex, nofollow"

[[headers]]
  for = "/camera"
  [headers.values]
    X-Robots-Tag = "noindex, nofollow"

[[headers]]
  for = "/upload"
  [headers.values]
    X-Robots-Tag = "noindex, nofollow"

[[headers]]
  for = "/capture"
  [headers.values]
    X-Robots-Tag = "noindex, nofollow"

[[headers]]
  for = "/review"
  [headers.values]
    X-Robots-Tag = "noindex, nofollow"

[[headers]]
  for = "/render"
  [headers.values]
    X-Robots-Tag = "noindex, nofollow"

[[headers]]
  for = "/output"
  [headers.values]
    X-Robots-Tag = "noindex, nofollow"

[[headers]]
  for = "/gallery"
  [headers.values]
    X-Robots-Tag = "noindex, nofollow"

[[headers]]
  for = "/privacyscreen"
  [headers.values]
    X-Robots-Tag = "noindex, nofollow"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
